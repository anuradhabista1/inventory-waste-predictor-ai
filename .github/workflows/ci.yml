name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  dotnet-tests:
    name: .NET Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore backend-dotnet/InventoryWastePredictor.slnx

      - name: Build
        run: dotnet build backend-dotnet/InventoryWastePredictor.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test backend-dotnet/InventoryWastePredictor.slnx --no-build --configuration Release --verbosity normal
