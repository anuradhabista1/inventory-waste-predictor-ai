app:
  name: Inventory Waste Predictor
  version: 0.1.0
  debug: false

api:
  host: 0.0.0.0
  port: 8000

model:
  type: xgboost          # xgboost | prophet | sklearn
  retrain_interval_days: 7
  forecast_horizon_days: 30
  waste_threshold: 0.25  # risk score above this = high waste risk

data:
  raw_path: data/raw/
  processed_path: data/processed/
  date_column: date
  target_column: waste_quantity
